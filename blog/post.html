<!DOCTYPE html>
<html class="dark" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Post | DEXA Blog</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00F0FF",
                        "primary-hover": "#00C2CC",
                        "background-light": "#000000",
                        "background-dark": "#000000",
                        "card-dark": "#0A0A0A",
                        "accent-green": "#39FF14",
                        "accent-purple": "#BC13FE",
                    },
                    fontFamily: {
                        display: ['"Noto Sans KR"', '"Inter"', "sans-serif"],
                        body: ['"Noto Sans KR"', '"Inter"', "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #000000;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 0px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00F0FF;
        }

        /* Prose styling for markdown content */
        .prose-dexa h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.025em;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .prose-dexa h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .prose-dexa h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e5e7eb;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
        }

        .prose-dexa p {
            color: #9ca3af;
            line-height: 1.8;
            margin-bottom: 1.25rem;
        }

        .prose-dexa strong {
            color: #ffffff;
            font-weight: 600;
        }

        .prose-dexa em {
            color: #6b7280;
        }

        .prose-dexa a {
            color: #00F0FF;
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            transition: border-color 0.2s;
        }

        .prose-dexa a:hover {
            border-bottom-color: #00F0FF;
        }

        .prose-dexa ul,
        .prose-dexa ol {
            color: #9ca3af;
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }

        .prose-dexa li {
            margin-bottom: 0.5rem;
            line-height: 1.7;
        }

        .prose-dexa ul li::marker {
            color: #00F0FF;
        }

        .prose-dexa ol li::marker {
            color: #00F0FF;
        }

        .prose-dexa blockquote {
            border-left: 3px solid #00F0FF;
            padding-left: 1.25rem;
            margin: 1.5rem 0;
            color: #6b7280;
            font-style: italic;
        }

        .prose-dexa pre {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.25rem;
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        .prose-dexa code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.875rem;
        }

        .prose-dexa p code {
            background: rgba(0, 240, 255, 0.1);
            color: #00F0FF;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .prose-dexa pre code {
            background: none;
            color: #e5e7eb;
            padding: 0;
        }

        .prose-dexa hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 2.5rem 0;
        }

        .prose-dexa img {
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 1.5rem 0;
        }
    </style>
</head>

<body class="text-gray-300 antialiased selection:bg-[#00F0FF] selection:text-black">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-black border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="../index.html" class="flex-shrink-0 flex items-center gap-3 group cursor-pointer">
                    <img src="../dexa_logo.svg" alt="DEXA Logo"
                        class="h-16 w-auto group-hover:drop-shadow-[0_0_8px_rgba(0,240,255,0.8)] transition-all">
                </a>
                <div class="hidden md:flex space-x-10 items-center">
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#00F0FF] transition-colors"
                        href="../index.html">HOME</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#00F0FF] transition-colors"
                        href="../index.html#studio">STUDIO</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-[#00F0FF] drop-shadow-[0_0_5px_rgba(0,240,255,0.5)]"
                        href="index.html">BLOG</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#00F0FF] transition-colors"
                        href="../about-deck.html">ABOUT</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#BC13FE] transition-colors"
                        href="../index.html#contact">CONTACT</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-400 hover:text-[#00F0FF]">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                </div>
            </div>
        </div>
        <nav id="mobile-menu" class="md:hidden bg-black/95 border-t border-white/10 hidden">
            <div class="px-4 py-2 space-y-2">
                <a href="../index.html" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">HOME</a>
                <a href="../index.html#studio" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">STUDIO</a>
                <a href="index.html" class="block py-2 text-[#00F0FF]">BLOG</a>
                <a href="../about-deck.html" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">ABOUT</a>
                <a href="../index.html#contact" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">CONTACT</a>
            </div>
        </nav>
    </nav>

    <!-- Post Content -->
    <main class="pt-32 pb-24 lg:pt-40">
        <article class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Post Meta -->
            <div id="post-meta" class="mb-10">
                <a href="index.html"
                    class="inline-flex items-center gap-1 text-xs font-mono text-gray-500 hover:text-[#00F0FF] transition-colors mb-6 uppercase tracking-wider">
                    <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Blog
                </a>
                <div class="flex items-center gap-3 mb-4">
                    <span id="post-category"
                        class="text-[#00F0FF] font-mono text-xs uppercase tracking-widest border border-[#00F0FF]/30 px-2 py-1 rounded-sm bg-[#00F0FF]/5"></span>
                    <span id="post-date" class="text-gray-600 font-mono text-xs"></span>
                </div>
                <div id="post-tags" class="flex flex-wrap gap-2 mt-4"></div>
            </div>

            <!-- Markdown Content -->
            <div id="post-content" class="prose-dexa">
                <div class="text-center py-20">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#00F0FF]"></div>
                    <p class="mt-4 text-gray-500 font-mono text-xs">Loading Post...</p>
                </div>
            </div>

            <!-- Post Navigation -->
            <div id="post-nav" class="mt-16 pt-8 border-t border-white/10 flex justify-between items-center hidden">
                <a id="prev-post" href="#"
                    class="flex items-center gap-2 text-sm text-gray-500 hover:text-[#00F0FF] transition-colors">
                    <span class="material-symbols-outlined text-lg">arrow_back</span>
                    <span id="prev-title">Previous</span>
                </a>
                <a id="next-post" href="#"
                    class="flex items-center gap-2 text-sm text-gray-500 hover:text-[#00F0FF] transition-colors">
                    <span id="next-title">Next</span>
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
                </a>
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer class="bg-black text-white pt-12 pb-8 border-t border-[#1a1a1a]">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <a href="../index.html" class="flex items-center gap-3">
                    <img src="../dexa_logo.svg" alt="DEXA" class="h-12 w-auto">
                </a>
                <p class="text-[10px] text-gray-700 font-mono text-center md:text-right">
                    Where AI Meets Art.<br />
                    &copy; 2025 DEXA. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="posts-content.js" onerror=""></script>
    <script src="blog.js"></script>
</body>

</html>
