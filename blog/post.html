<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Post | DEXA Blog</title>
    <meta name="robots" content="noindex,follow" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <link rel="stylesheet" href="/dexa-theme.css" />
    <style>
        .dx-menu-btn { display: none; }
        @media (max-width: 768px) {
            .dx-nav-links { display: none; }
            .dx-menu-btn { display: inline-flex; align-items: center; }
        }
        .dx-spinner { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line); border-top-color: var(--orange); animation: dx-spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes dx-spin { to { transform: rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) { .dx-spinner { animation: none; } }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="dx-nav">
        <a href="/" class="dx-nav-brand">
            <svg viewBox="4 4 112 98" width="34" height="30" aria-hidden="true">
                <g stroke-linejoin="round">
                    <path d="M60 10 109 95H11Z" fill="none" stroke="#17181B" stroke-width="5.5"></path>
                    <path d="M60 20 79 53H41Z" fill="#17181B"></path>
                    <path d="M36 57 55 90H17Z" fill="#17181B"></path>
                    <path d="M84 57 103 90H65Z" fill="#FF5A1F"></path>
                    <path d="M60 51 79 84H41Z" fill="#F5F1E6" stroke="#17181B" stroke-width="3.5"></path>
                </g>
            </svg>
            <span class="wordmark">DEXA<span class="dot">.</span></span>
            <span class="dx-nav-tag">AI × MEDIA ART STUDIO</span>
        </a>
        <div class="dx-nav-links">
            <a href="/">HOME</a>
            <a href="/#studio">STUDIO</a>
            <a href="/blog/" class="active">BLOG</a>
            <a href="/about-deck.html">ABOUT</a>
            <a href="/#contact">CONTACT</a>
        </div>
        <button id="mobile-menu-btn" class="dx-menu-btn" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-menu">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M3 5H17M3 10H17M3 15H17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
            </svg>
        </button>
    </nav>
    <div id="mobile-menu" class="dx-mobile-menu hidden">
        <a href="/">HOME</a>
        <a href="/#studio">STUDIO</a>
        <a href="/blog/">BLOG</a>
        <a href="/about-deck.html">ABOUT</a>
        <a href="/#contact">CONTACT</a>
    </div>

    <!-- Post Content -->
    <main style="padding:128px 24px 96px;">
        <article style="max-width:720px;margin:0 auto;">
            <!-- Post Meta -->
            <div id="post-meta" style="margin-bottom:40px;">
                <a href="index.html" class="btn-ghost" style="padding-left:0;">← Back to Blog</a>
                <div style="display:flex;align-items:center;gap:12px;margin:20px 0 0;">
                    <span id="post-category" class="dx-badge"></span>
                    <span id="post-date" class="dx-date"></span>
                </div>
                <div id="post-tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;"></div>
            </div>

            <!-- Markdown Content -->
            <div id="post-content" class="prose">
                <div style="text-align:center;padding:80px 0;">
                    <div class="dx-spinner"></div>
                    <p class="mono" style="margin-top:16px;color:var(--muted);font-size:11px;letter-spacing:0.06em;">LOADING POST...</p>
                </div>
            </div>

            <!-- Post Navigation -->
            <nav id="post-nav" class="spec-list hidden" style="margin-top:64px;" aria-label="Post navigation">
                <a id="prev-post" href="#" class="spec-row" style="text-decoration:none;">
                    <span class="k">← PREV</span>
                    <span id="prev-title">Previous</span>
                </a>
                <a id="next-post" href="#" class="spec-row" style="text-decoration:none;">
                    <span id="next-title">Next</span>
                    <span class="k">NEXT →</span>
                </a>
            </nav>
        </article>
    </main>

    <!-- Footer -->
    <footer class="dx-footer" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;">
        <a href="/" style="display:flex;align-items:center;gap:10px;">
            <svg viewBox="4 4 112 98" width="28" height="24" aria-hidden="true">
                <g stroke-linejoin="round">
                    <path d="M60 10 109 95H11Z" fill="none" stroke="#17181B" stroke-width="5.5"></path>
                    <path d="M60 20 79 53H41Z" fill="#17181B"></path>
                    <path d="M36 57 55 90H17Z" fill="#17181B"></path>
                    <path d="M84 57 103 90H65Z" fill="#FF5A1F"></path>
                    <path d="M60 51 79 84H41Z" fill="#F5F1E6" stroke="#17181B" stroke-width="3.5"></path>
                </g>
            </svg>
        </a>
        <p class="dx-footer-note" style="margin:0;text-align:right;">Where AI Meets Art.<br />&copy; 2025 DEXA. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="posts-content.js" onerror=""></script>
    <script src="blog.js"></script>
</body>

</html>
