<!DOCTYPE html>
<html class="dark" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Blog | DEXA</title>
    <meta name="description" content="DEXA 블로그 — AI, 미디어아트, 크리에이티브 테크놀로지에 대한 이야기">
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00F0FF",
                        "primary-hover": "#00C2CC",
                        "background-light": "#000000",
                        "background-dark": "#000000",
                        "card-dark": "#0A0A0A",
                        "accent-green": "#39FF14",
                        "accent-purple": "#BC13FE",
                    },
                    fontFamily: {
                        display: ['"Noto Sans KR"', '"Inter"', "sans-serif"],
                        body: ['"Noto Sans KR"', '"Inter"', "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #000000;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 0px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00F0FF;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5), 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .card-hover-effect {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover-effect:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
            border-color: #00F0FF;
        }

        .filter-btn.active {
            color: #00F0FF;
            border-color: #00F0FF;
            background: rgba(0, 240, 255, 0.1);
        }
    </style>
</head>

<body class="text-gray-300 antialiased selection:bg-[#00F0FF] selection:text-black">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-black border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="../index.html" class="flex-shrink-0 flex items-center gap-3 group cursor-pointer">
                    <img src="../dexa_logo.jpg" alt="DEXA Logo"
                        class="h-16 w-auto group-hover:drop-shadow-[0_0_8px_rgba(0,240,255,0.8)] transition-all">
                </a>
                <div class="hidden md:flex space-x-10 items-center">
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#00F0FF] transition-colors"
                        href="../index.html">HOME</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#00F0FF] transition-colors"
                        href="../index.html#studio">STUDIO</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-[#00F0FF] drop-shadow-[0_0_5px_rgba(0,240,255,0.5)]"
                        href="index.html">BLOG</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#00F0FF] transition-colors"
                        href="../about-deck.html">ABOUT</a>
                    <a class="text-sm font-semibold uppercase tracking-wider text-gray-400 hover:text-[#BC13FE] transition-colors"
                        href="../index.html#contact">CONTACT</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-400 hover:text-[#00F0FF]">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                </div>
            </div>
        </div>
        <nav id="mobile-menu" class="md:hidden bg-black/95 border-t border-white/10 hidden">
            <div class="px-4 py-2 space-y-2">
                <a href="../index.html" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">HOME</a>
                <a href="../index.html#studio" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">STUDIO</a>
                <a href="index.html" class="block py-2 text-[#00F0FF]">BLOG</a>
                <a href="../about-deck.html" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">ABOUT</a>
                <a href="../index.html#contact" class="block py-2 text-gray-300 hover:text-[#00F0FF] transition-colors">CONTACT</a>
            </div>
        </nav>
    </nav>

    <!-- Header -->
    <header class="pt-32 pb-12 lg:pt-40 lg:pb-16">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-5xl md:text-6xl font-black tracking-tighter text-white mb-4">
                Blog<span class="text-[#00F0FF]">.</span>
            </h1>
            <p class="text-gray-500 font-mono text-sm tracking-widest uppercase">/// Thoughts on AI, Art & Technology</p>
        </div>
    </header>

    <!-- Filters -->
    <section class="border-b border-white/10 mb-12">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="filter-bar" class="flex gap-3 pb-6 overflow-x-auto">
                <button class="filter-btn active px-4 py-2 text-xs font-mono uppercase tracking-wider border border-white/20 rounded-sm transition-all hover:border-[#00F0FF] hover:text-[#00F0FF]"
                    data-filter="all">All</button>
                <!-- Dynamic filter buttons will be added here -->
            </div>
        </div>
    </section>

    <!-- Post Grid -->
    <main class="pb-24">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Posts loaded dynamically -->
                <div class="col-span-full text-center py-20">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#00F0FF]"></div>
                    <p class="mt-4 text-gray-500 font-mono text-xs">Loading Posts...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black text-white pt-12 pb-8 border-t border-[#1a1a1a]">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <a href="../index.html" class="flex items-center gap-3">
                    <img src="../dexa_logo.jpg" alt="DEXA" class="h-12 w-auto">
                </a>
                <p class="text-[10px] text-gray-700 font-mono text-center md:text-right">
                    Where AI Meets Art.<br />
                    &copy; 2025 DEXA. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="blog.js"></script>
</body>

</html>
