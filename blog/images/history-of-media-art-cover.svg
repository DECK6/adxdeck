<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#101c38"/>
      <stop offset="1" stop-color="#02070d"/>
    </linearGradient>
    <linearGradient id="line" x1="180" y1="0" x2="1420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#7CFFB2"/>
    </linearGradient>
    <linearGradient id="wave" x1="260" y1="230" x2="1360" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00F0FF" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8DFF8A" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.22"/>

  <g opacity="0.14">
    <circle cx="260" cy="180" r="170" fill="#00F0FF"/>
    <circle cx="1320" cy="260" r="220" fill="#7C3AED"/>
    <circle cx="1180" cy="720" r="160" fill="#00FFA3"/>
  </g>

  <path d="M180 610 C320 520 410 650 530 560 C650 470 730 660 850 560 C970 460 1080 670 1210 540 C1290 460 1360 500 1420 450" stroke="url(#wave)" stroke-width="7" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M180 660 C300 590 410 730 540 645 C650 570 760 730 880 630 C1000 530 1100 705 1220 610 C1325 530 1380 560 1420 540" stroke="url(#wave)" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>

  <g stroke="url(#line)" stroke-width="2">
    <line x1="180" y1="730" x2="1420" y2="730"/>
    <line x1="300" y1="710" x2="300" y2="750"/>
    <line x1="470" y1="710" x2="470" y2="750"/>
    <line x1="640" y1="710" x2="640" y2="750"/>
    <line x1="810" y1="710" x2="810" y2="750"/>
    <line x1="980" y1="710" x2="980" y2="750"/>
    <line x1="1150" y1="710" x2="1150" y2="750"/>
    <line x1="1320" y1="710" x2="1320" y2="750"/>
  </g>

  <g fill="#D7F9FF">
    <text x="180" y="176" font-family="Arial, Helvetica, sans-serif" font-size="28" letter-spacing="5.2" opacity="0.82">MEDIA ART TIMELINE</text>
    <text x="180" y="270" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="86" letter-spacing="1.6">HISTORY OF</text>
    <text x="180" y="365" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="102" letter-spacing="2.8" fill="#FFFFFF">MEDIA ART</text>
    <text x="184" y="432" font-family="Arial, Helvetica, sans-serif" font-size="30" opacity="0.78">From kinetic experiments and video art to data, immersion, and AI</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#E7F7FF" opacity="0.92">
    <text x="270" y="790">1920s</text>
    <text x="437" y="790">1960s</text>
    <text x="607" y="790">1970s</text>
    <text x="777" y="790">1990s</text>
    <text x="949" y="790">2000s</text>
    <text x="1116" y="790">2010s</text>
    <text x="1286" y="790">2020s</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#AEE8F7" opacity="0.78">
    <text x="238" y="690">KINETIC</text>
    <text x="422" y="690">VIDEO</text>
    <text x="565" y="690">ALGORITHM</text>
    <text x="748" y="690">INTERACTIVE</text>
    <text x="952" y="690">NETWORK</text>
    <text x="1123" y="690">IMMERSIVE</text>
    <text x="1300" y="690">AI</text>
  </g>

  <g>
    <circle cx="300" cy="730" r="10" fill="#00F0FF"/>
    <circle cx="470" cy="730" r="10" fill="#7DD3FC"/>
    <circle cx="640" cy="730" r="10" fill="#38BDF8"/>
    <circle cx="810" cy="730" r="10" fill="#A78BFA"/>
    <circle cx="980" cy="730" r="10" fill="#8B5CF6"/>
    <circle cx="1150" cy="730" r="10" fill="#34D399"/>
    <circle cx="1320" cy="730" r="10" fill="#7CFFB2"/>
  </g>

  <g opacity="0.6">
    <rect x="1140" y="118" width="250" height="154" rx="22" fill="#09101C" fill-opacity="0.56" stroke="#BEEBFF" stroke-opacity="0.24"/>
    <text x="1172" y="162" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#8DE7FF">KEY SHIFTS</text>
    <text x="1172" y="203" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#FFFFFF">Object → System</text>
    <text x="1172" y="234" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#FFFFFF">Viewing → Participation</text>
    <text x="1172" y="265" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#FFFFFF">Medium → Post-media</text>
  </g>
</svg>
